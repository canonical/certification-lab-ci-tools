[tox]
envlist = py310
skip_missing_interpreters = true

[testenv]
# These scriptlets are standalone scripts, not an installable package.
skip_install = true
deps =
    pytest
    pytest-cov
    pytest-xdist
    ruff
commands =
    ruff check src tests
    ruff format --check src tests
    pytest -n=auto --cov=src --cov-fail-under=100 --cov-report term-missing
    coverage xml
